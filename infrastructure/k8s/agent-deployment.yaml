apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: knova-ai
data:
  LIVEKIT_URL: ws://livekit:7880
  DATABASE_URL: postgresql://knova:knova123@postgres:5432/knova
  REDIS_URL: redis://redis:6379
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: knova-ai
type: Opaque
data:
  LIVEKIT_API_KEY: QVBJd0ZkSlBvbml4N3Y=  # APIwFdJPonix7v in base64
  LIVEKIT_API_SECRET: NWtFYXJUN2Y4aU9pVnZQU0Vablh... # Add full secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  namespace: knova-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      containers:
      - name: agent
        image: knova-ai/agent:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        envFrom:
        - configMapRef:
            name: agent-config
        - secretRef:
            name: agent-secrets
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-worker-hpa
  namespace: knova-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80