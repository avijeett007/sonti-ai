apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: knova-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: knova-ai
data:
  POSTGRES_DB: knova
  POSTGRES_USER: knova
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: knova-ai
type: Opaque
data:
  POSTGRES_PASSWORD: a25vdmExMjM=  # knova123 in base64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: knova-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: knova-ai
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432