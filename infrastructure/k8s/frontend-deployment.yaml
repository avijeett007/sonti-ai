apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: knova-ai
data:
  NEXT_PUBLIC_LIVEKIT_URL: ws://livekit:7880
  NEXT_PUBLIC_API_URL: http://frontend:3000/api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: knova-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: knova-ai/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        envFrom:
        - configMapRef:
            name: frontend-config
        - secretRef:
            name: frontend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: knova-ai
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer